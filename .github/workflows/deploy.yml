name: Build & Deploy to Azure Container Apps

# Deploys automatically on pushes to main; manual runs allowed too.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for OIDC (passwordless) login to Azure. No secrets/publish
# profiles stored in the repo — GitHub mints a short-lived token instead.
permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  # Non-sensitive config — set these as GitHub Actions *Variables* (vars.*).
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP }}
  ACR_NAME: ${{ vars.ACR_NAME }}
  IMAGE_NAME: cyc-originals

jobs:
  # ---------------------------------------------------------------------
  # 1. Validate: install deps, lint, and run the vitest suite as a BLOCKING
  #    quality gate. A test failure fails this job and (via `needs`) blocks
  #    the deploy — recommendation-quality regressions can no longer ship
  #    silently. CI has no CYC_DATA_DIR, so warehouse-gated tests (incl. the
  #    real-data golden tier) skip cleanly; the hermetic suite runs. To also
  #    run the real-data golden tier in CI, provision CYC_DATA_DIR.
  # ---------------------------------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (available quality gate — non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Unit & integration tests (vitest — blocking quality gate)
        run: npm test

  # ---------------------------------------------------------------------
  # 2. Build the Docker image, push to ACR, and roll the Container App to
  #    the new immutable image tag.
  # ---------------------------------------------------------------------
  build-and-deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # NEXT_PUBLIC_* are inlined into the client bundle at build time.
          # They are public-by-design (shipped to the browser), so passing
          # them as build args is safe.
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_RAZORPAY_KEY_ID=${{ secrets.NEXT_PUBLIC_RAZORPAY_KEY_ID }}
            NEXT_PUBLIC_GA_MEASUREMENT_ID=${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
            NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          # Server-only secret needed during `next build` (module-scope Supabase
          # admin clients). Passed as a BuildKit secret so it is NOT baked into
          # any image layer or the GHA build cache.
          secrets: |
            supabase_service_role_key=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy new revision to Azure Container Apps
        run: |
          az containerapp update \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --image "${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"

      - name: Output app URL
        run: |
          FQDN=$(az containerapp show \
            --name "$CONTAINER_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "### Deployed 🎉" >> "$GITHUB_STEP_SUMMARY"
          echo "https://$FQDN" >> "$GITHUB_STEP_SUMMARY"
